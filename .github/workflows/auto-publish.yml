name: Auto Publish (하루 2회)

on:
  schedule:
    # KST 07:00 = UTC 22:00 (전날)
    - cron: '0 22 * * *'
    # KST 18:00 = UTC 09:00
    - cron: '0 9 * * *'
  workflow_dispatch:  # 수동 실행도 가능

jobs:
  trigger-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger auto-publish (동기 모드)
        run: |
          echo "=== $(TZ=Asia/Seoul date) ==="
          echo ""
          
          # ★ 핵심: async_mode 사용하지 않음! 동기 모드로 직접 Pages API 호출
          # Pages Worker가 글 생성 완료할 때까지 기다림 (2~3분)
          # GitHub Actions는 10분 타임아웃이므로 충분함
          
          RESPONSE=$(curl -s -X POST \
            "https://inblogauto.pages.dev/api/cron/generate" \
            -H "Content-Type: application/json" \
            -d '{"count":1,"manual":false,"auto_publish":true}' \
            --max-time 480)
          
          HTTP_CODE=$(echo "$RESPONSE" | python3 -c "
          import json, sys
          try:
            d = json.load(sys.stdin)
            msg = d.get('message','')
            results = d.get('results',[])
            print(f'메시지: {msg}')
            for r in results:
              print(f'  제목: {r.get(\"title\",\"없음\")}')
              print(f'  상태: {r.get(\"status\",\"없음\")}')
              print(f'  URL: {r.get(\"inblog_url\",\"없음\")}')
              print(f'  SEO: {r.get(\"seo_score\",\"없음\")}')
          except:
            print(f'Raw: {sys.stdin.read()[:500]}')
          " 2>&1)
          
          echo "$HTTP_CODE"
          echo ""
          echo "=== 완료: $(TZ=Asia/Seoul date) ==="
